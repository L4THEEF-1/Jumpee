<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Over</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="menuBody">
    <div class="menu-screen">
        <h1 class="title" align="center">Game Over</h1>
        <br>
        <button id="start-btn">Return To Menu</button>
        <audio id="deadassSound" preload="auto">
            <source src="busted.mp3" type="audio/mp3">
            <audio id="overSound" preload="auto">
                <source src="overSound.mp3" type="audio/mp3">
            </audio>
            
    <div class="particles"></div>

    <script>
    const startBtn = document.getElementById('start-btn');
    const particlesContainer = document.querySelector('.particles');
    
    const audio = new Audio('gameStart.mp3'); 
    
    startBtn.addEventListener('click', () => {

        audio.play();
        startBtn.classList.add('fade');

        audio.addEventListener('ended', () => {
            window.location.href = 'levels.html';  
        });
    });

        function createParticle() {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.animationDuration = Math.random() * 5 + 3 + 's';
            particlesContainer.appendChild(particle);
            setTimeout(() => {
                particle.remove();
            }, 8000);
        }

        setInterval(createParticle, 100);

                window.addEventListener('DOMContentLoaded', () => {
                    const deadass = document.getElementById('deadassSound');
                    const overSound = document.getElementById('overSound');
                    
                    // Play deadass sound immediately
                    deadass.volume = 1.0;
                    deadass.play().catch(error => {
                        console.error("Deadass sound failed to play:", error);
                        // Fallback: Try again after user interaction
                        document.body.addEventListener('click', () => {
                            deadass.play().catch(e => console.error("Still couldn't play:", e));
                        }, { once: true });
                    });
                    
                    const startBtn = document.getElementById('start-btn');
                    startBtn.addEventListener('click', () => {
                        overSound.volume = 1.0;
                        overSound.currentTime = 0; // Rewind if already played
                        overSound.play()
                            .then(() => {
                                startBtn.classList.add('fade');
                                overSound.addEventListener('ended', () => {
                                    window.location.href = 'levels.html';
                                });
                            })
                            .catch(error => {
                                console.error("Over sound failed to play:", error);
                                // Fallback: Navigate without sound
                                startBtn.classList.add('fade');
                                setTimeout(() => {
                                    window.location.href = 'levels.html';
                                }, 500);
                            });
                    });
                });
            </script>
        </body>
        </html>
